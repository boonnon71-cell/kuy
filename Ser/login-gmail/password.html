<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <title>เข้าสู่ระบบ</title>
    <link rel="icon" type="image/png" href="Up.d copy.png">
    <style>
        * {
            box-sizing: border-box;
            font-family: "Segoe UI", Tahoma, sans-serif;
        }
        
        body {
            margin: 0;
            height: 100vh;
            background: url("หอประชุมพญางำเมือง_638544951942604029 copy.jpg") center/cover no-repeat;
            position: relative;
        }
        
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
        }
        
        .header {
            position: relative;
            z-index: 2;
            padding: 20px 40px;
            color: #fff;
            font-size: 20px;
        }
        
        .card {
            position: relative;
            z-index: 2;
            background: #fff;
            width: 720px;
            margin: 40px auto 0;
            padding: 40px;
            border-radius: 10px;
        }
        
        .label {
            font-size: 14px;
            margin-bottom: 8px;
        }
        
        input {
            width: 100%;
            border: none;
            border-bottom: 1px solid #999;
            padding: 10px 4px;
            font-size: 15px;
            outline: none;
        }
        
        .actions {
            margin-top: 30px;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }
        
        button {
            padding: 8px 22px;
            border: none;
            border-radius: 2px;
            font-size: 14px;
            cursor: pointer;
        }
        
        .btn-back {
            background: #e0e0e0;
        }
        
        .btn-next {
            background: #1976ff;
            color: #fff;
        }
        
        .header {
            position: relative;
            z-index: 2;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #fff;
        }
        
        .header .title {
            font-size: 18px;
            font-weight: 500;
        }
        
        .header img {
            height: 70px;
        }
        
        .password-box {
            position: relative;
        }
        
        .toggle-password {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 18px;
        }
        
        .alert-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.65);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        
        .alert-card {
            background: #fff;
            width: 360px;
            padding: 30px;
            border-radius: 18px;
            text-align: center;
        }
        
        .alert-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        
        .alert-card h3 {
            margin: 0 0 8px;
            color: #1976ff;
        }
        
        .alert-card p {
            font-size: 14px;
            margin-bottom: 20px;
        }
        
        .alert-btn {
            background: #1976ff;
            color: #fff;
            border: none;
            padding: 10px 26px;
            border-radius: 999px;
            cursor: pointer;
        }
        
        .forgot-password {
            text-align: right;
            margin-top: 10px;
            margin-bottom: 10px;
        }
        
        .forgot-password a {
            font-size: 13px;
            color: #1976ff;
            text-decoration: none;
        }
        
        .forgot-password a:hover {
            text-decoration: underline;
        }
    </style>
    <script>
        const correctPassword = "fiw301022@"; // รหัสผ่านตัวอย่าง

        function login() {
            const pwd = document.getElementById("password").value.trim();

            if (pwd === "") {
                showAlert("กรุณากรอกรหัสผ่าน");
                return;
            }

            if (pwd !== correctPassword) {
                showAlert("รหัสผ่านไม่ถูกต้อง");
                return;
            }

            // ⭐ บันทึกข้อมูลผู้ใช้
            const userData = {
                name: "นางสาวณิชาภัทร ตรัยรัตนเมธี",
                nameEN: "Nichaphat Trairatthanamethi",
                role: "นิสิตทันตแพทย์",
                email: "68023559@up.ac.th",
                image: "14769.jpg"
            };

            localStorage.setItem("currentUser", JSON.stringify(userData));

            // ✅ เพิ่มบรรทัดนี้ (หัวใจของระบบแจ้งเตือน)
            localStorage.setItem("justLoggedIn", "true");

            // ไปหน้าหลัก
            window.location.href = "index.html";
        }


        function showAlert(msg) {
            document.getElementById("alertMessage").innerText = msg;
            document.getElementById("alertBox").style.display = "flex";
        }

        function closeAlert() {
            document.getElementById("alertBox").style.display = "none";
        }

        function togglePassword() {
            const pwd = document.getElementById("password");
            pwd.type = pwd.type === "password" ? "text" : "password";
        }
    </script>

</head>

<body>

    <div class="header">
        <div class="title">โรงพยาบาลทันตกรรมมหาวิทยาลัยพะเยา</div>
        <img src="Up.d copy.png" alt="UP Logo">
    </div>

    <div class="card">
        <div class="label">รหัสผ่าน</div>

        <div class="password-box">
            <input type="password" id="password" placeholder="รหัสผ่าน">
            <span class="toggle-password" onclick="togglePassword()">👁</span>
        </div>
        <div class="forgot-password">
            <a href="password2.html">ลืมรหัสผ่าน?</a>
        </div>


        <div class="actions">
            <button class="btn-back" onclick="window.location.href='../login-gmail/gmail.html'">
            ย้อนกลับ
        </button>

            <button class="btn-next" onclick="login()">
            ลงชื่อเข้าใช้
        </button>

        </div>
    </div>

    <div class="alert-overlay" id="alertBox">
        <div class="alert-card">
            <div class="alert-icon">⚠️</div>
            <h3>เข้าสู่ระบบไม่สำเร็จ</h3>
            <p id="alertMessage"></p>
            <button class="alert-btn" onclick="closeAlert()">ตกลง</button>
        </div>
    </div>

</body>

</html>
