function saveDoctor() {
  const name = document.getElementById('df-name').value.trim();
  const email = document.getElementById('df-email').value.trim();
  if (!name) { toast('กรุณากรอกชื่อ-สกุล', 'error'); return; }
  if (email && !email.endsWith('@up.ac.th')) { toast('อีเมลต้องเป็น @up.ac.th', 'error'); return; }
  const dr = { id: String(Date.now()), name, year: document.getElementById('df-year').value, specialty: document.getElementById('df-specialty').value, email, phone: document.getElementById('df-phone').value, sid: document.getElementById('df-sid').value };
  DB.setDoctors([...DB.doctors(), dr]);
  // Also add as user
  const users = DB.users();
  if (email && !users.find(u => u.email === email)) {
    users.push({ id: 'dr_' + dr.id, email, password: document.getElementById('df-pw').value || '1234', role: 'doctor', name, year: dr.year, specialty: dr.specialty });
    DB.set('users', users);
  }
  toast(`เพิ่มแพทย์ ${name} แล้ว`, 'success');
  closeModal(); renderTab(currentTab);
}

function saveAppt(id) {
  const date = document.getElementById('appt-date').value;
  if (!date) { toast('กรุณาเลือกวันนัด', 'error'); return; }
  if (date < todayISO()) { toast('ไม่สามารถนัดย้อนหลังได้', 'error'); return; }
  const note = document.getElementById('appt-note').value;
  const pts = DB.patients().map(p => p.id === id ? { ...p, appointmentDate: date, appointmentNote: note } : p);
  const pt = pts.find(p => p.id === id);
  DB.setPatients(pts);
  const days = daysDiff(date);
  DB.addNotif(currentUser.email, `นัด ${pt.name} วันที่ ${fmtDate(date)} (อีก ${days} วัน)`, '📅', 'blue');
  if (pt.patientEmail) DB.addNotif(pt.patientEmail, `${currentUser.name} นัดคุณวันที่ ${fmtDate(date)}`, '📅', 'green');
  toast(`บันทึกนัดหมาย ${fmtDate(date)} แล้ว`, 'success');
  closeModal(); updateNotifBadge(); renderTab(currentTab);
}

  const pt = pts.find(p => p.id === id);

    </div>`;
  window._ptInfoDays = [...(info.availableDays || [])];
  window._ptInfoTime = info.availableTime;
}
 
function toggleDay(d) {
  const idx = window._ptInfoDays.indexOf(d);
  if (idx >= 0) window._ptInfoDays.splice(idx, 1); else window._ptInfoDays.push(d);
  DAYS.forEach(day => {
    const btn = document.getElementById('day-' + day);
    if (btn) btn.className = `btn ${window._ptInfoDays.includes(day) ? 'btn-navy' : 'btn-ghost'}`;
  });
}
 
function selectTime(t) {
  window._ptInfoTime = t;
  TIMES.forEach(time => {
    const btn = document.getElementById('time-' + time);
    if (btn) btn.className = `btn ${window._ptInfoTime === time ? 'btn-navy' : 'btn-ghost'}`;
  });
}
 
function savePtInfo() {
  const info = { name: document.getElementById('pt-name').value, availableDays: window._ptInfoDays, availableTime: window._ptInfoTime };
  DB.setPatientInfo(currentUser.email, info);
  // Update patient record
  const pts = DB.patients().map(p => p.patientEmail === currentUser.email ? { ...p, patientInfo: info } : p);
  DB.setPatients(pts);
  const saved = document.getElementById('pt-info-saved');
  saved.style.display = 'flex'; setTimeout(() => saved.style.display = 'none', 2500);
  toast('บันทึกข้อมูลแล้ว', 'success');
}

    <div class="chat-header">
      ${avatarHtml(c.name, 36)}
      <div><div style="font-weight:700;font-size:15px">${c.name}</div><div style="font-size:12px;color:var(--gray3)">${c.type === 'doctor' ? 'แพทย์' : 'ผู้ป่วย'}</div></div>
    </div>
    <div class="chat-messages" id="chat-msgs">
      ${msgs.map(m => {
    const mine = m.sender === currentUser.email;
    return `<div class="chat-bubble-wrap ${mine ? 'mine' : ''}">
          ${!mine ? avatarHtml(c.name, 28) : ''}
          <div>
            <div class="chat-bubble ${mine ? 'mine' : 'other'}">${m.text}</div>
            <div class="chat-time">${m.time}</div>
          </div>
        </div>`;
  }).join('')}
      ${!msgs.length ? '<div style="text-align:center;color:var(--gray3);padding:40px 0;font-size:14px">เริ่มบทสนทนา 👋</div>' : ''}
    </div>
    <div class="chat-input-bar">
      <input class="chat-input" id="chat-input-box" placeholder="พิมพ์ข้อความ..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChatMsg()}">
      <button class="btn btn-navy" onclick="sendChatMsg()">ส่ง →</button>
    </div>`;
}
 
function selectChatTarget(c) {
  chatTarget = c;
  const main = document.getElementById('chat-main');
  if (main) { main.innerHTML = renderChatMain(); scrollChatBottom(); }
  document.querySelectorAll('.chat-contact').forEach(el => el.classList.remove('active'));
  event.currentTarget?.classList.add('active');
}
 
function sendChatMsg() {
  const input = document.getElementById('chat-input-box');
  const text = input?.value.trim();
  if (!text || !chatTarget) return;
  const key = [currentUser.email, chatTarget.email || chatTarget.id].sort().join('__');
  const msgs = DB.chats(key);
  msgs.push({ sender: currentUser.email, senderName: currentUser.name, text, time: thaiNow() });
  DB.setChats(key, msgs);
  // Notify target
  const targetEmail = chatTarget.email;
  if (targetEmail) {
    DB.addNotif(targetEmail, `${currentUser.name}: ${text.slice(0, 40)}${text.length > 40 ? '...' : ''}`, '💬', 'blue');
    updateNotifBadge();
  }
  input.value = '';
  const main = document.getElementById('chat-main');
  if (main) { main.innerHTML = renderChatMain(); scrollChatBottom(); }
}
 
function scrollChatBottom() { setTimeout(() => { const m = document.getElementById('chat-msgs'); if (m) m.scrollTop = m.scrollHeight; }, 50); }
 
/* ============================================================
   NOTIFICATIONS PAGE
   ============================================================ */
function renderNotifPage() {
  const el = document.getElementById('main-content');
  const notifs = DB.notifs(currentUser.email);
  el.innerHTML = `
    <div class="page-header">
      <div><div class="page-title">การแจ้งเตือน</div><div class="page-subtitle">การแจ้งเตือนทั้งหมด</div></div>
      ${notifs.length ? `<button class="btn btn-ghost btn-sm" onclick="clearNotifs()">ล้างทั้งหมด</button>` : ''}
    </div>
    <div class="card">
      ${notifs.length ? notifs.map(n => `
        <div class="notif-item ${n.unread ? 'unread' : ''}">
          <div class="notif-icon-wrap ${n.color || 'blue'}">${n.icon || '🔔'}</div>
          <div style="flex:1">
            <div class="notif-msg">${n.msg}</div>
            <div class="notif-time">${n.time}</div>
          </div>
        </div>`).join('') : emptyState('🔔', 'ไม่มีการแจ้งเตือน', '')}
    </div>`;
  // Mark all read
  const updated = notifs.map(n => ({ ...n, unread: false }));
  DB.set('notif_' + currentUser.email, updated);
  updateNotifBadge();
}
 
function clearNotifs() {
  DB.set('notif_' + currentUser.email, []);
  updateNotifBadge();
  renderTab(currentTab);
}
 
/* ============================================================
   PROFILE
   ============================================================ */
function renderProfile() {
  const el = document.getElementById('main-content');
  const u = currentUser;
  el.innerHTML = `
    <div class="page-header"><div class="page-title">โปรไฟล์ของฉัน</div></div>
    <div class="card" style="max-width:480px">
      <div class="card-body" style="text-align:center;padding:32px">
        ${avatarHtml(u.name, 80, colorForRole(u.role))}
        <div style="margin:16px 0">
          <div style="font-size:22px;font-weight:700;margin-bottom:6px">${u.name}</div>
          <div style="color:var(--gray3);font-size:14px">${u.email}</div>
          <div style="margin-top:8px"><span class="badge badge-teal">${u.role === 'staff' ? 'เวชระเบียน' : u.role === 'doctor' ? `นักศึกษาทันตแพทย์ ปี ${u.year}` : 'ผู้ป่วย'}</span></div>
        </div>
      </div>
      <div class="card-body" style="border-top:1px solid var(--gray1)">
        ${u.specialty ? `<div class="history-field"><span class="history-key">ความเชี่ยวชาญ</span><span class="history-val">${u.specialty}</span></div>` : ''}
        ${u.year ? `<div class="history-field"><span class="history-key">ชั้นปี</span><span class="history-val">ปีที่ ${u.year}</span></div>` : ''}
        <div class="history-field"><span class="history-key">อีเมล</span><span class="history-val">${u.email}</span></div>
        <div class="history-field"><span class="history-key">บทบาท</span><span class="history-val">${u.role === 'staff' ? 'เจ้าหน้าที่เวชระเบียน' : u.role === 'doctor' ? 'นักศึกษาทันตแพทย์' : 'ผู้ป่วย'}</span></div>
      </div>
    </div>`;
}
 
/* ============================================================
   HELPERS
   ============================================================ */
function emptyState(icon, title, desc) {
  return `<div class="empty-state"><span class="empty-icon">${icon}</span><div class="empty-title">${title}</div>${desc ? `<div class="empty-desc">${desc}</div>` : ''}</div>`;
}
 
function paginationHtml(page, total, varName, fn) {
  if (total <= 1) return '';
  const btns = [];
  btns.push(`<button class="page-btn" ${page === 1 ? 'disabled' : ''} onclick="${varName}=${page - 1};${fn}()">‹</button>`);
  for (let i = 1; i <= total; i++) {
    btns.push(`<button class="page-btn ${i === page ? 'active' : ''}" onclick="${varName}=${i};${fn}()">${i}</button>`);
  }
  btns.push(`<button class="page-btn" ${page === total ? 'disabled' : ''} onclick="${varName}=${page + 1};${fn}()">›</button>`);
  return `<div class="pagination">${btns.join('')}</div>`;
}
 
/* ============================================================
   APPOINTMENT REMINDER CHECKER
   ============================================================ */
function checkApptReminders() {
  if (!currentUser || currentUser.role !== 'doctor') return;
  const myPts = DB.patients().filter(p => String(p.doctorId) === String(currentUser.id) && p.appointmentDate);
  myPts.forEach(pt => {
    const days = daysDiff(pt.appointmentDate);
    if (days === 5 || days === 1) {
      const msg = `ผู้ป่วย ${pt.name} อีก ${days} วันจะถึงคิว (${fmtDate(pt.appointmentDate)})`;
      const notifs = DB.notifs(currentUser.email);
      const alreadyNotified = notifs.some(n => n.msg.includes(pt.name) && n.msg.includes(`อีก ${days} วัน`) && n.time.includes(new Date().toLocaleDateString('th-TH')));
      if (!alreadyNotified) {
        DB.addNotif(currentUser.email, msg, days === 1 ? '🚨' : '⚠️', days === 1 ? 'red' : 'amber');
        updateNotifBadge();
      }
    }
  });
}
 
// Check reminders every minute
setInterval(() => { if (currentUser) { checkApptReminders(); } }, 60000);
// Auto-refresh data every 5 seconds (simulate real-time)
setInterval(() => {
  if (currentUser && currentTab) {
    // Silent refresh for chat
    if (currentTab.includes('chat') && chatTarget) {
      const main = document.getElementById('chat-main');
      if (main && chatTarget) { main.innerHTML = renderChatMain(); }
    }
  }
}, 5000);
    </script>
