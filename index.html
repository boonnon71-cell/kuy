<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <title>เลือกการเข้าสู่ระบบ</title>
    <link rel="icon" type="image/png" href="Up.d.png">
    <style>
        body {
            margin: 0;
            font-family: Segoe UI;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* รูปพื้นหลังเต็มจอ */
            background: url("หอประชุมพญางำเมือง_638544951942604029.jpg") no-repeat center center/cover;
        }
        /* กล่องตรงกลาง */
        
        .box {
            background: rgba(74, 74, 74, 0.9);
            padding: 40px;
            border-radius: 10px;
            text-align: center;
        }
        
        button {
            padding: 15px 30px;
            margin: 10px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
        }
        
        .doctor {
            background: #3b82f6;
            color: white;
        }
        
        .user {
            background: #22c55e;
            color: white;
        }
    </style>

</head>

<body>

    <div class="box">

        <h2>เลือกการเข้าสู่ระบบ</h2>

        <button class="doctor" onclick="location.href='login.html'">
            เข้าสู่ระบบแพทย์
        </button>

        <button class="user" onclick="location.href='loginUser.html'">
            เข้าสู่ระบบผู้ป่วย
        </button>

    </div>

</body>

</html>
