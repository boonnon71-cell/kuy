        }
        
        .box {

        .doctor {

        }
        
        .user {
            background: #22c55e;
            color: white;
        }

</head>

<body>

    <div class="box">

        <h2>เลือกการเข้าสู่ระบบ</h2>

        <button class="doctor" onclick="location.href='login.html'">
เข้าสู่ระบบแพทย์
</button>

        <button class="user" onclick="location.href='loginUser.html'">
เข้าสู่ระบบผู้ป่วย
</button>

    </div>

</html>
